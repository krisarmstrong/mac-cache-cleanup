name: Feature request
description: Suggest a new tool, a new app to clean, or an improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that's awkward or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? (e.g. a new package, a flag, a different schedule option.)
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New app/tool to clean
        - clear-outlook-cache
        - clear-teams-cache
        - clear-browsers
        - Installer / scheduling
        - Docs
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Anything you've already tried or ruled out (optional).
